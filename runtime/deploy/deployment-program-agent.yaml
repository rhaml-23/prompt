apiVersion: apps/v1
kind: Deployment
metadata:
  name: program-agent
  namespace: compliance-fleet
  labels:
    app.kubernetes.io/name: program-agent
    app.kubernetes.io/part-of: compliance-fleet
    app.kubernetes.io/component: agent
    compliance-fleet/role: program
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: program-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: program-agent
        app.kubernetes.io/part-of: compliance-fleet
        compliance-fleet/role: program
    spec:
      containers:
        - name: program-agent
          image: compliance-fleet/agent:latest
          env:
            - name: AGENT_TYPE
              value: "program"
          envFrom:
            - configMapRef:
                name: compliance-fleet-config
            - secretRef:
                name: compliance-fleet-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["python", "-c", "print('alive')"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "from runtime.factory import create_runtime; print('ready')"]
            initialDelaySeconds: 15
            periodSeconds: 10
      restartPolicy: Always
